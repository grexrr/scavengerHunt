# CI override — removes fixed names/ports that would conflict with dev stack
# Usage: docker compose -f docker-compose.yml -f docker-compose.ci.yml up

services:
  spring-backend:
    container_name: ci-spring-backend
    ports:
      - "8080"
    environment:
      JWT_SECRET: "ci-test-secret-not-for-production"
      SPRING_PROFILES_ACTIVE: "ci"

  landmark-processor:
    container_name: ci-landmark-processor
    ports: []

  puzzle-agent:
    container_name: ci-puzzle-agent
    ports: []

  mongo:
    container_name: ci-mongo
    ports: []                   # never expose mongo host port in CI
    volumes:
      - ci-mongo-data:/data/db  # use a separate volume, not the dev volume

volumes:
  ci-mongo-data:                # temporary CI volume — cleaned up after each build
