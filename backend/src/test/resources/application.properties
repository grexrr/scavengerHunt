# overwrite docker hostname
spring.data.mongodb.uri=mongodb://localhost:27017/scavengerhunt-test
landmark.processor.url=http://localhost:5000
puzzle.agent.url=http://localhost:5001
app.jwt.secret=test-only-secret-not-for-production-min-256-bits-padding
app.jwt.expiration-ms=86400000
de.flapdoodle.mongodb.embedded.version=7.0.0

app.puzzle-agent.url=${PUZZLE_AGENT_URL:http://localhost:5001}
app.puzzle-agent.timeout-seconds=10

resilience4j.circuitbreaker.instances.puzzleAgent.sliding-window-size=5
resilience4j.circuitbreaker.instances.puzzleAgent.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.puzzleAgent.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.puzzleAgent.permitted-number-of-calls-in-half-open-state=2
